<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700;900&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Source Sans 3',sans-serif;background:#f4f4f4;color:#111;min-height:100vh;}
    header{background:#fff;border-bottom:3px solid #c00;padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;}
    .logo{font-family:'Merriweather',serif;font-size:1.2rem;font-weight:900;color:#111;}
    .logo span{color:#c00;}
    .hdr-right{font-size:.82rem;color:#888;}
    .hdr-right a{color:#c00;cursor:pointer;font-weight:600;text-decoration:none;}
    .hdr-right a:hover{text-decoration:underline;}
    .wrap{max-width:740px;margin:36px auto;padding:0 16px 60px;}
    .card{background:#fff;border-radius:8px;border:1px solid #e0e0e0;padding:32px 28px;margin-bottom:24px;}
    .card h2{font-family:'Merriweather',serif;font-size:1.2rem;font-weight:900;color:#111;margin-bottom:20px;}
    .field{display:flex;flex-direction:column;gap:4px;margin-bottom:14px;}
    .field label{font-size:.82rem;font-weight:700;color:#444;}
    .field input,.field textarea,.field select{width:100%;padding:11px 13px;border:1px solid #ddd;border-radius:4px;font-size:.92rem;font-family:'Source Sans 3',sans-serif;color:#111;outline:none;}
    .field input:focus,.field textarea:focus,.field select:focus{border-color:#c00;}
    .field textarea{min-height:180px;resize:vertical;}
    .field .hint{font-size:.72rem;color:#aaa;margin-top:2px;}
    .btn{background:#c00;color:#fff;border:none;padding:12px 24px;border-radius:4px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:'Source Sans 3',sans-serif;}
    .btn:hover{background:#a00;}
    .btn:disabled{background:#bbb;cursor:not-allowed;}
    .btn-sec{background:#444;margin-left:8px;}
    .btn-sec:hover{background:#222;}
    .msg{padding:11px 14px;border-radius:4px;font-size:.87rem;font-weight:600;margin-top:12px;}
    .msg.ok{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;}
    .msg.err{background:#ffebee;color:#c62828;border:1px solid #ef9a9a;}
    .msg.info{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9;}
    .modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center;padding:20px;}
    .modal-ov.open{display:flex;}
    .modal-box{background:#fff;border-radius:8px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;padding:32px 28px;}
    .modal-box h2{font-family:'Merriweather',serif;font-size:1.15rem;font-weight:900;margin-bottom:20px;}
    .modal-close-btn{float:right;background:none;border:none;font-size:1.4rem;cursor:pointer;color:#888;margin-top:-4px;}
    .modal-close-btn:hover{color:#c00;}
    .tabs{display:flex;gap:0;border-bottom:2px solid #eee;margin-bottom:20px;}
    .tab{padding:9px 20px;font-size:.85rem;font-weight:700;cursor:pointer;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;}
    .tab:hover{color:#c00;}
    .tab.active{color:#c00;border-bottom-color:#c00;}
    .n-item{display:flex;justify-content:space-between;align-items:flex-start;padding:13px 0;border-bottom:1px solid #f0f0f0;gap:12px;}
    .n-item:last-child{border-bottom:none;}
    .n-title{font-size:.88rem;font-weight:700;color:#111;margin-bottom:3px;}
    .n-meta{font-size:.74rem;color:#aaa;}
    .n-badge{font-size:.6rem;font-weight:700;padding:1px 6px;background:#c00;color:#fff;text-transform:uppercase;border-radius:2px;margin-right:4px;}
    .n-url{font-size:.7rem;color:#1565c0;word-break:break-all;margin-top:2px;}
    .loading{text-align:center;padding:40px;color:#aaa;}
    .spinner{width:28px;height:28px;border:3px solid #eee;border-top-color:#c00;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    #loginSection{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 58px);}
    .login-card{background:#fff;border-radius:8px;border:1px solid #e0e0e0;padding:40px 36px;width:100%;max-width:420px;}
    .login-card h1{font-family:'Merriweather',serif;font-size:1.4rem;font-weight:900;margin-bottom:6px;}
    .login-card p{font-size:.85rem;color:#888;margin-bottom:24px;}
    @media(max-width:500px){
      header{padding:0 14px;}
      .login-card,.card{padding:24px 16px;}
    }
  </style>
</head>
<body>

<header>
  <span class="logo">MacroMind News — Admin</span>
  <div class="hdr-right" id="hdrRight"><a href="/">Volver al sitio</a></div>
</header>

<!-- LOGIN -->
<div id="loginSection">
  <div class="login-card">
    <h1>🔐 Acceder</h1>
    <p>Panel exclusivo de administración.</p>
    <div class="field"><label>Correo electrónico</label><input type="email" id="aEmail" onkeydown="if(event.key==='Enter')document.getElementById('aPass').focus()"/></div>
    <div class="field"><label>Contraseña</label><input type="password" id="aPass" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn" onclick="doLogin()">Ingresar</button>
    <div id="loginErr"></div>
  </div>
</div>

<!-- PANEL -->
<div id="panelSection" style="display:none;">
  <div class="wrap">
    <div class="tabs">
      <div class="tab active" onclick="showTab('tabNew',this)">📝 Nueva Noticia</div>
      <div class="tab" onclick="showTab('tabList',this)">📋 Publicadas (<span id="totalCount">0</span>)</div>
    </div>

    <!-- NUEVA NOTICIA -->
    <div id="tabNew">
      <div class="card">
        <h2>📝 Nueva Noticia</h2>
        <div class="field"><label>Título *</label><input type="text" id="aT" placeholder="Título completo"/></div>
        <div class="field"><label>Bajada *</label><input type="text" id="aC" placeholder="Resumen en 1-2 oraciones"/></div>
        <div class="field">
          <label>Categoría *</label>
          <select id="aCat">
            <option value="">— Seleccioná —</option>
            <option value="Economia">Economía</option>
            <option value="Politica">Política</option>
            <option value="Finanzas">Finanzas</option>
            <option value="Internacional">Internacional</option>
          </select>
        </div>
        <div class="field"><label>Fecha *</label><input type="text" id="aF" placeholder="Ej: 13 de mayo de 2026"/></div>
        <div class="field"><label>Imagen</label><input type="text" id="aImg" placeholder="img/nombre.jpg"/><p class="hint">Subí a /img en GitHub primero</p></div>
        <div class="field"><label>Cuerpo *</label>
          <div style="display:flex;flex-wrap:wrap;gap:4px;padding:8px;background:#f8f8f8;border:1px solid #ddd;border-bottom:none;border-radius:4px 4px 0 0;">
            <button type="button" class="btn" style="padding:4px 9px;font-size:.8rem;background:#fff;color:#333;border:1px solid #ddd;" onclick="efmt('bold')" title="Negrita"><b>B</b></button>
            <button type="button" class="btn" style="padding:4px 9px;font-size:.8rem;background:#fff;color:#333;border:1px solid #ddd;" onclick="efmt('h2')" title="Subtítulo">H2</button>
            <button type="button" class="btn" style="padding:4px 9px;font-size:.8rem;background:#fff;color:#333;border:1px solid #ddd;" onclick="efmt('insertUnorderedList')" title="Items">•</button>
            <button type="button" class="btn" style="padding:4px 9px;font-size:.8rem;background:#fff;color:#333;border:1px solid #ddd;" onclick="abrirModalImg('aBody')" title="Insertar imagen">🖼</button>
            <button type="button" class="btn" style="padding:4px 9px;font-size:.8rem;background:#fff;color:#333;border:1px solid #ddd;" onclick="abrirModalTweet('aBody')" title="Tweet">𝕏</button>
          </div>
          <div id="aBody" contenteditable="true" style="width:100%;min-height:180px;padding:12px 13px;border:1px solid #ddd;border-radius:0 0 4px 4px;font-size:.92rem;font-family:'Source Sans 3',sans-serif;color:#111;outline:none;line-height:1.6;"></div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn" id="pubBtn" onclick="publicar()">Publicar Noticia</button>
          <button class="btn btn-sec" onclick="limpiar()">Limpiar</button>
        </div>
        <div id="pubMsg"></div>
      </div>
    </div>

    <!-- LISTA -->
    <div id="tabList" style="display:none;">
      <div class="card">
        <h2>📋 Noticias publicadas</h2>
        <div id="adminList"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL IMAGEN -->
<div class="modal-ov" id="imgModal">
  <div class="modal-box" style="max-width:460px;">
    <button class="modal-close-btn" onclick="cerrarModalImg()">×</button>
    <h2>🖼 Insertar Imagen</h2>
    <div class="field"><label>URL de la imagen</label><input type="text" id="imgUrl" placeholder="https://... o img/foto.jpg"/></div>
    <div class="field"><label>Texto alternativo</label><input type="text" id="imgAlt" placeholder="Descripción de la imagen"/></div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn" onclick="insertarImg()">Insertar</button>
      <button class="btn btn-sec" onclick="cerrarModalImg()">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL TWEET -->
<div class="modal-ov" id="tweetModal">
  <div class="modal-box" style="max-width:460px;">
    <button class="modal-close-btn" onclick="cerrarModalTweet()">×</button>
    <h2>𝕏 Incrustar Tweet</h2>
    <div class="field"><label>URL del tweet</label><input type="text" id="tweetUrl" placeholder="https://x.com/usuario/status/123456"/></div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn" onclick="insertarTweet()">Incrustar</button>
      <button class="btn btn-sec" onclick="cerrarModalTweet()">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal-ov" id="editModal">
  <div class="modal-box">
    <button class="modal-close-btn" onclick="cerrarModal()">×</button>
    <h2>✏️ Editar Noticia</h2>
    <input type="hidden" id="eId"/>
    <div class="field"><label>Título *</label><input type="text" id="eT"/></div>
    <div class="field"><label>Bajada *</label><input type="text" id="eC"/></div>
    <div class="field">
      <label>Categoría *</label>
      <select id="eCat">
        <option value="Economia">Economía</option>
        <option value="Politica">Política</option>
        <option value="Finanzas">Finanzas</option>
        <option value="Internacional">Internacional</option>
      </select>
    </div>
    <div class="field"><label>Fecha *</label><input type="text" id="eF"/></div>
    <div class="field"><label>Imagen</label><input type="text" id="eImg"/></div>
    <div class="field"><label>Cuerpo *</label>
      <div style="display:flex;flex-wrap:wrap;gap:4px;padding:8px;background:#f8f8f8;border:1px solid #ddd;border-bottom:none;border-radius:4px 4px 0 0;">
        <button type="button" class="btn" style="padding:4px 9px;font-size:.8rem;background:#fff;color:#333;border:1px solid #ddd;" onclick="efmtE('bold')" title="Negrita"><b>B</b></button>
        <button type="button" class="btn" style="padding:4px 9px;font-size:.8rem;background:#fff;color:#333;border:1px solid #ddd;" onclick="efmtE('h2')" title="Subtítulo">H2</button>
        <button type="button" class="btn" style="padding:4px 9px;font-size:.8rem;background:#fff;color:#333;border:1px solid #ddd;" onclick="efmtE('insertUnorderedList')" title="Items">•</button>
        <button type="button" class="btn" style="padding:4px 9px;font-size:.8rem;background:#fff;color:#333;border:1px solid #ddd;" onclick="abrirModalImg('eBody')" title="Insertar imagen">🖼</button>
        <button type="button" class="btn" style="padding:4px 9px;font-size:.8rem;background:#fff;color:#333;border:1px solid #ddd;" onclick="abrirModalTweet('eBody')" title="Tweet">𝕏</button>
      </div>
      <div id="eBody" contenteditable="true" style="width:100%;min-height:180px;padding:12px 13px;border:1px solid #ddd;border-radius:0 0 4px 4px;font-size:.92rem;font-family:'Source Sans 3',sans-serif;color:#111;outline:none;line-height:1.6;"></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;">
      <button class="btn" id="saveBtn" onclick="guardarEdicion()">Guardar Cambios</button>
      <button class="btn btn-sec" onclick="cerrarModal()">Cancelar</button>
    </div>
    <div id="editMsg"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const app = initializeApp({
  apiKey:"AIzaSyAMJAYYWwVE0fnNuFV5TFJ5tYfhvbMG3lw",
  authDomain:"macromindnews.firebaseapp.com",
  projectId:"macromindnews",
  storageBucket:"macromindnews.firebasestorage.app",
  messagingSenderId:"737656477515",
  appId:"1:737656477515:web:d75386f60de67d11193ace"
});
const db   = getFirestore(app);
const auth = getAuth(app);

const GH_USER  = 'Urielpereyra15';
const GH_REPO  = 'MacroMindNews';
const GH_TOKEN = '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';

const catLabel = c => ({Economia:'ECONOMÍA',Politica:'POLÍTICA',Finanzas:'FINANZAS',Internacional:'INTERNACIONAL'}[c]||c);

function slugify(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s-]/g,'')
    .trim().replace(/\s+/g,'-')
    .replace(/-+/g,'-')
    .substring(0,80);
}

function t2h(t) {
  if (!t) return '';
  if (t.includes('<p>')) return t;
  return t.split(/\n\n+/).map(p=>p.trim()).filter(Boolean).map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
}

async function subirAGitHub(filename, content, mensaje, sha=null) {
  const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${filename}`;
  const body = {
    message: mensaje,
    content: btoa(unescape(encodeURIComponent(content))),
    branch: 'main'
  };
  if (sha) body.sha = sha;
  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${GH_TOKEN}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('Error al subir a GitHub');
  return await res.json();
}

async function obtenerSHA(filename) {
  const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${filename}`;
  const res = await fetch(url, {
    headers: { 'Authorization': `token ${GH_TOKEN}` }
  });
  if (res.status === 404) return null;
  const data = await res.json();
  return data.sha || null;
}

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('panelSection').style.display = 'block';
    document.getElementById('hdrRight').innerHTML = `<span style="margin-right:10px;">👤 ${user.email}</span> <a onclick="doLogout()">Cerrar sesión</a>`;
    cargarLista();
  } else {
    document.getElementById('loginSection').style.display = 'flex';
    document.getElementById('panelSection').style.display = 'none';
  }
});

window.doLogin = async function() {
  const email = document.getElementById('aEmail').value.trim();
  const pass  = document.getElementById('aPass').value;
  const err   = document.getElementById('loginErr');
  const btn   = document.querySelector('header + div .btn');
  err.innerHTML = '';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    err.innerHTML = '<div class="msg err">Correo o contraseña incorrectos.</div>';
  }
};

window.doLogout = async function() {
  await signOut(auth);
};

window.publicar = async function() {
  const t    = document.getElementById('aT').value.trim();
  const c    = document.getElementById('aC').value.trim();
  const cat  = document.getElementById('aCat').value;
  const f    = document.getElementById('aF').value.trim();
  const img  = document.getElementById('aImg').value.trim();
  const body = document.getElementById('aBody').value.trim();
  const msg  = document.getElementById('pubMsg');
  const btn  = document.getElementById('pubBtn');

  if (!t||!c||!cat||!f||!body) {
    msg.innerHTML='<div class="msg err">Completá todos los campos (*)</div>';
    return;
  }

  btn.disabled=true; btn.textContent='Publicando...'; msg.innerHTML='';
  msg.innerHTML='<div class="msg info">⏳ Guardando en Firebase...</div>';

  try {
    const slug = slugify(t);
    const filename = `${slug}.html`;

    // Generar HTML individual
    const noticia = {titulo:t, copete:c, categoria:cat, fecha:f, imagen:img, cuerpo:body, slug};
    const htmlContent = generarHTMLNoticia(noticia);
    
    // Guardar en Firebase
    await addDoc(collection(db,'noticias'), {
      titulo:t, copete:c, categoria:cat, fecha:f, imagen:img, cuerpo:body, slug, filename, timestamp:serverTimestamp()
    });

    msg.innerHTML='<div class="msg info">⏳ Subiendo a GitHub...</div>';

    // Subir HTML a GitHub
    const sha = await obtenerSHA(filename);
    await subirAGitHub(filename, htmlContent, `Publicar: ${t}`, sha);

    msg.innerHTML='<div class="msg ok">✅ Noticia publicada en macromindnews.com.ar/' + filename + '</div>';
    limpiar();
    cargarLista();
  } catch(e) {
    msg.innerHTML=`<div class="msg err">Error: ${e.message}</div>`;
  }
  btn.disabled=false; btn.textContent='Publicar Noticia';
};

window.limpiar = function() {
  ['aT','aC','aF','aImg','aBody'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('aCat').value='';
  document.getElementById('pubMsg').innerHTML='';
};

async function cargarLista() {
  const el  = document.getElementById('adminList');
  const cnt = document.getElementById('totalCount');
  el.innerHTML='<div class="loading"><div class="spinner"></div>Cargando...</div>';
  const q = query(collection(db,'noticias'),orderBy('timestamp','desc'));
  const snap = await getDocs(q);
  const ns=[];
  snap.forEach(d=>ns.push({id:d.id,...d.data()}));
  cnt.textContent=ns.length;
  if(!ns.length){el.innerHTML='<p style="color:#aaa;">Sin noticias.</p>';return;}
  el.innerHTML=ns.map(n=>`<div class="n-item">
    <div style="flex:1;">
      <div class="n-title">${n.titulo}</div>
      <div class="n-meta"><span class="n-badge">${catLabel(n.categoria)}</span>${n.fecha}</div>
      ${n.slug?`<div class="n-url">macromindnews.com.ar/${n.slug}.html</div>`:''}
    </div>
    <button onclick="eliminar('${n.id}','${n.filename||''}')" style="background:#ffebee;color:#c62828;border:none;padding:5px 12px;border-radius:4px;font-size:.75rem;font-weight:700;cursor:pointer;margin-left:6px;">Eliminar</button>
    <button onclick="abrirEditar('${n.id}')" style="background:#1565c0;color:#fff;border:none;padding:5px 12px;border-radius:4px;font-size:.75rem;font-weight:700;cursor:pointer;">Editar</button>
  </div>`).join('');
}

window.eliminar = async function(id, filename) {
  if(!confirm('¿Eliminar? No se puede deshacer.')) return;
  try {
    await deleteDoc(doc(db,'noticias',id));
    cargarLista();
  } catch(e) {
    alert('Error: '+e.message);
  }
};

window.showTab = function(tabId, el) {
  document.getElementById('tabNew').style.display  = tabId==='tabNew'  ? 'block':'none';
  document.getElementById('tabList').style.display = tabId==='tabList' ? 'block':'none';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  if(tabId==='tabList') cargarLista();
};

window.abrirEditar = async function(id) {
  const q = query(collection(db,'noticias'),orderBy('timestamp','desc'));
  const snap = await getDocs(q);
  let n = null;
  snap.forEach(d=>{ if(d.id===id) n={id:d.id,...d.data()}; });
  if(!n) return;
  document.getElementById('eId').value    = n.id;
  document.getElementById('eT').value     = n.titulo||'';
  document.getElementById('eC').value     = n.copete||'';
  document.getElementById('eCat').value   = n.categoria||'';
  document.getElementById('eF').value     = n.fecha||'';
  document.getElementById('eImg').value   = n.imagen||'';
  document.getElementById('eBody').value  = n.cuerpo||'';
  document.getElementById('editMsg').innerHTML='';
  document.getElementById('editModal').classList.add('open');
};

window.cerrarModal = function() {
  document.getElementById('editModal').classList.remove('open');
};

window.guardarEdicion = async function() {
  const id   = document.getElementById('eId').value;
  const t    = document.getElementById('eT').value.trim();
  const c    = document.getElementById('eC').value.trim();
  const cat  = document.getElementById('eCat').value;
  const f    = document.getElementById('eF').value.trim();
  const img  = document.getElementById('eImg').value.trim();
  const body = document.getElementById('eBody').value.trim();
  const msg  = document.getElementById('editMsg');
  const btn  = document.getElementById('saveBtn');

  if(!t||!c||!cat||!f||!body){msg.innerHTML='<div class="msg err">Completá todos los campos.</div>';return;}
  btn.disabled=true; btn.textContent='Guardando...'; msg.innerHTML='';
  msg.innerHTML='<div class="msg info">⏳ Actualizando...</div>';

  try {
    const newSlug = slugify(t);
    const newFilename= `${newSlug}.html`;

    await updateDoc(doc(db,'noticias',id),{
      titulo:t, copete:c, categoria:cat, fecha:f, imagen:img, cuerpo:body, slug:newSlug, filename:newFilename
    });

    const noticia = {titulo:t,copete:c,categoria:cat,fecha:f,imagen:img,cuerpo:body,slug:newSlug};
    const htmlContent = generarHTMLNoticia(noticia);
    const sha = await obtenerSHA(newFilename);
    await subirAGitHub(newFilename, htmlContent, `Actualizar: ${t}`, sha);

    msg.innerHTML='<div class="msg ok">✅ Noticia actualizada.</div>';
    cargarLista();
    setTimeout(()=>cerrarModal(), 1500);
  } catch(e) {
    msg.innerHTML=`<div class="msg err">Error: ${e.message}</div>`;
  }
  btn.disabled=false; btn.textContent='Guardar Cambios';
};
