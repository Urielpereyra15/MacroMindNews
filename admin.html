    .field .hint{font-size:.72rem;color:#aaa;margin-top:2px;}

function slugify(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s-]/g,'')
    .trim().replace(/\s+/g,'-')

}

function t2h(t) {

<script>
  const modalOverlay = document.getElementById('modalOverlay');

  const subscribeForm = document.getElementById('subscribeForm');
  const formSuccess = document.getElementById('formSuccess');
  document.querySelectorAll('#openModal, #openModalDrawer').forEach(btn => {
    btn.addEventListener('click', e => { e.preventDefault(); modalOverlay.classList.add('open'); document.getElementById('modalEmail').focus(); });
  });
  modalClose.addEventListener('click', () => modalOverlay.classList.remove('open'));
  modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) modalOverlay.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') modalOverlay.classList.remove('open'); });
  subscribeForm.addEventListener('submit', async e => {
    e.preventDefault();
    try {
      const res = await fetch('https://formspree.io/f/xbdarrjv', { method: 'POST', body: new FormData(subscribeForm), headers: { 'Accept': 'application/json' } });
      if (res.ok) { subscribeForm.style.display='none'; formSuccess.style.display='block'; setTimeout(() => { modalOverlay.classList.remove('open'); setTimeout(() => { subscribeForm.style.display='block'; formSuccess.style.display='none'; subscribeForm.reset(); }, 400); }, 2500); }
    } catch(e) {}
  });
  const hbtn = document.getElementById('hamburger');
  const drawer = document.getElementById('navDrawer');
  hbtn.addEventListener('click', () => { hbtn.classList.toggle('open'); drawer.classList.toggle('open'); });

  const pageUrl = encodeURIComponent(window.location.href);
  const pageTitle = encodeURIComponent(document.title);
  document.getElementById('shareX').href = 'https://x.com/intent/tweet?url=' + pageUrl + '&text=' + pageTitle;
  document.getElementById('shareFb').href = 'https://www.facebook.com/sharer/sharer.php?u=' + pageUrl;
  document.getElementById('shareWa').href = 'https://wa.me/?text=' + pageTitle + '%20' + pageUrl;
  document.getElementById('shareTg').href = 'https://t.me/share/url?url=' + pageUrl + '&text=' + pageTitle;
  function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.style.background = '#1a8c3a';
      setTimeout(() => { btn.style.background = '#555'; }, 2000);
    });
  }
  function fmtNum(n, dec=0) { if(n==null||isNaN(n)) return '-'; return Number(n).toLocaleString('es-AR',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }
  function makeItem(label,value) { return '<span class="ticker-item"><span class="ticker-label">'+label+'</span><span class="ticker-value">'+value+'</span></span>'; }

    const track = document.getElementById('tickerTrack');

// Sube o actualiza un archivo en GitHub
async function subirAGitHub(filename, content, mensaje, sha=null) {
  const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${filename}`;
  const body = {
    message: mensaje,
    content: btoa(unescape(encodeURIComponent(content))),
    branch: 'main'
  };
  if (sha) body.sha = sha;
  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${GH_TOKEN}`,
      'Content-Type': 'application/json',
      'Accept': 'application/vnd.github.v3+json'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || 'Error al subir a GitHub');
  }
  return await res.json();
}

// Obtiene el SHA de un archivo existente en GitHub (para poder actualizarlo)
async function obtenerSHA(filename) {
  const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${filename}`;
  const res = await fetch(url, {
    headers: {
      'Authorization': `token ${GH_TOKEN}`,
      'Accept': 'application/vnd.github.v3+json'
    }
  });
  if (res.status === 404) return null;
  const data = await res.json();
  return data.sha || null;
}

// Elimina un archivo de GitHub
async function eliminarDeGitHub(filename) {
  const sha = await obtenerSHA(filename);
  if (!sha) return;
  const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${filename}`;
  await fetch(url, {
    method: 'DELETE',
    headers: {
      'Authorization': `token ${GH_TOKEN}`,
      'Content-Type': 'application/json',
      'Accept': 'application/vnd.github.v3+json'
    },
    body: JSON.stringify({ message: `Eliminar noticia: ${filename}`, sha, branch: 'main' })
  });
}

// PUBLICAR
window.publicar = async function() {
  const t    = document.getElementById('aT').value.trim();
  const c    = document.getElementById('aC').value.trim();
  const cat  = document.getElementById('aCat').value;
  const f    = document.getElementById('aF').value.trim();
  const img  = document.getElementById('aImg').value.trim();
  const body = document.getElementById('aBody').innerHTML.trim();
  const msg  = document.getElementById('pubMsg');
  const btn  = document.getElementById('pubBtn');

  if (!t||!c||!cat||!f||!body) {
    msg.innerHTML='<div class="msg err">⚠️ Completá todos los campos obligatorios (*).</div>';
    return;
  }

  btn.disabled=true; btn.textContent='Publicando...'; msg.innerHTML='';
  msg.innerHTML='<div class="msg info">⏳ Guardando en Firebase...</div>';

  try {
    const slug = slugify(t);
    const filename = `${slug}.html`;

    // 1. Guardar en Firebase
    await addDoc(collection(db,'noticias'), {
      titulo:t, copete:c, categoria:cat, fecha:f, imagen:img, cuerpo:body, slug, filename, timestamp:serverTimestamp()
    });

    msg.innerHTML='<div class="msg info">⏳ Generando página HTML en GitHub...</div>';

    // 2. Generar y subir HTML a GitHub
    const noticia = {titulo:t, copete:c, categoria:cat, fecha:f, imagen:img, cuerpo:body, slug};
    const htmlContent = generarHTMLNoticia(noticia);
    const sha = await obtenerSHA(filename);
    await subirAGitHub(filename, htmlContent, `Publicar noticia: ${t}`, sha);
    await actualizarSitemap(slug);

    msg.innerHTML='<div class="msg ok">✅ Noticia publicada y página creada en macromindnews.com.ar/' + filename + '</div>';
    limpiar();
    cargarLista();
  } catch(e) {
    msg.innerHTML=`<div class="msg err">Error: ${e.message}</div>`;
  }
  btn.disabled=false; btn.textContent='Publicar Noticia';
};

window.limpiar = function() {
  ['aT','aC','aF','aImg'].forEach(id=>document.getElementById(id).value='');

  document.getElementById('pubMsg').innerHTML='';
};

// CARGAR LISTA
async function cargarLista() {
  const el  = document.getElementById('adminList');
  const cnt = document.getElementById('totalCount');
  el.innerHTML='<div class="loading"><div class="spinner"></div>Cargando...</div>';
  const q = query(collection(db,'noticias'),orderBy('timestamp','desc'));
  const snap = await getDocs(q);
  const ns=[];
  snap.forEach(d=>ns.push({id:d.id,...d.data()}));
  cnt.textContent=ns.length;
  if(!ns.length){el.innerHTML='<p style="color:#aaa;font-size:.88rem;padding:12px 0;">No hay noticias publicadas aún.</p>';return;}
  el.innerHTML=ns.map(n=>`
    <div class="n-item">
      <div style="flex:1;">
        <div class="n-title">${n.titulo}</div>
        <div class="n-meta"><span class="n-badge">${catLabel(n.categoria)}</span>${n.fecha||''}</div>
        ${n.slug?`<div class="n-url">macromindnews.com.ar/${n.slug}.html</div>`:''}
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
        <button class="btn-edit" onclick="abrirEditar('${n.id}')">Editar</button>

}

// GUARDAR EDICIÓN
window.guardarEdicion = async function() {
  const id   = document.getElementById('eId').value;
  const oldSlug = document.getElementById('eSlug').value;
  const t    = document.getElementById('eT').value.trim();
  const c    = document.getElementById('eC').value.trim();
  const cat  = document.getElementById('eCat').value;
  const f    = document.getElementById('eF').value.trim();
  const img  = document.getElementById('eImg').value.trim();
  const body = document.getElementById('eBody').innerHTML.trim();
  const msg  = document.getElementById('editMsg');
  const btn  = document.getElementById('saveBtn');

  if(!t||!c||!cat||!f||!body){msg.innerHTML='<div class="msg err">Completá todos los campos.</div>';return;}
  btn.disabled=true; btn.textContent='Guardando...'; msg.innerHTML='';
  msg.innerHTML='<div class="msg info">⏳ Actualizando...</div>';

  try {
    const newSlug    = slugify(t);
    const newFilename= `${newSlug}.html`;

    // Actualizar Firebase
    await updateDoc(doc(db,'noticias',id),{
      titulo:t, copete:c, categoria:cat, fecha:f, imagen:img, cuerpo:body, slug:newSlug, filename:newFilename
    });

    // Si el slug cambió, eliminar el archivo viejo de GitHub
    if(oldSlug && oldSlug !== newSlug) {
      await eliminarDeGitHub(`${oldSlug}.html`);
    }

    // Subir nuevo HTML a GitHub
    const noticia = {titulo:t,copete:c,categoria:cat,fecha:f,imagen:img,cuerpo:body,slug:newSlug};
    const htmlContent = generarHTMLNoticia(noticia);
    const sha = await obtenerSHA(newFilename);
    await subirAGitHub(newFilename, htmlContent, `Actualizar noticia: ${t}`, sha);

    msg.innerHTML='<div class="msg ok">✅ Noticia actualizada correctamente.</div>';
    cargarLista();
    setTimeout(()=>cerrarModal(), 1500);
  } catch(e) {
    msg.innerHTML=`<div class="msg err">Error: ${e.message}</div>`;
  }
  btn.disabled=false; btn.textContent='Guardar Cambios';
};

window.eliminar = async function(id, filename, titulo) {
  if(!confirm(`¿Eliminar "${titulo}"? Esta acción no se puede deshacer.`)) return;
  try {
    await deleteDoc(doc(db,'noticias',id));
    if(filename) await eliminarDeGitHub(filename);
    cargarLista();
  } catch(e) {
    alert('Error al eliminar: '+e.message);
  }
};

// ── ACTUALIZAR SITEMAP ──
async function actualizarSitemap(slug) {
  try {
    const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/sitemap.xml`;
    const res = await fetch(url, {
      headers: { 'Authorization': `token ${GH_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!res.ok) return;
    const data = await res.json();
    const sha = data.sha;
    const xmlActual = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
    const hoy = new Date().toISOString().split('T')[0];
    const nuevaUrl = `  <url>\n    <loc>https://macromindnews.com.ar/${slug}.html</loc>\n    <lastmod>${hoy}</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.8</priority>\n  </url>`;
    const xmlNuevo = xmlActual.replace('</urlset>', nuevaUrl + '\n</urlset>');
    await subirAGitHub('sitemap.xml', xmlNuevo, `Agregar ${slug} al sitemap`, sha);
  } catch(e) {
    console.warn('Error actualizando sitemap:', e.message);
  }
}
